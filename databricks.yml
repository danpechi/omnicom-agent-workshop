bundle:
  name: omnicom_affinity_hub

variables:
  catalog:
    description: "UC catalog for workshop data"
    default: "databricks_workshop"
  schema:
    description: "UC schema for workshop data"
    default: "sample"
  volume:
    description: "UC volume for documents and eval files (user-scoped)"
    default: "${workspace.current_user.short_name}_adtech_docs"
  data_catalog:
    description: "Catalog containing shared structured + unstructured data tables"
    default: "databricks_workshop"
  data_schema:
    description: "Schema containing shared structured + unstructured data tables"
    default: "sample"
  llm_endpoint:
    description: "Databricks LLM serving endpoint"
    default: "databricks-claude-sonnet-4-5"
  ka_name:
    description: "Knowledge Assistant name (user-scoped)"
    default: "${workspace.current_user.short_name}-adtech-ka"
  ka_endpoint:
    description: "KA serving endpoint name (user-scoped)"
    default: "${workspace.current_user.short_name}-adtech-ka"
  genie_name:
    description: "Genie Space name (user-scoped)"
    default: "${workspace.current_user.short_name}-adtech-genie"
  supervisor_endpoint:
    description: "Supervisor Agent serving endpoint name (user-scoped)"
    default: "${workspace.current_user.short_name}-adtech-supervisor"
  experiment_name:
    description: "MLflow experiment subdir under /Users/<current_user>/"
    default: "${workspace.current_user.short_name}-adtech-eval"
  tenant_sps_table:
    description: "UC table name for tenant service principal lookup (user-scoped)"
    default: "${workspace.current_user.short_name}_tenant_sps"
  app_name:
    description: "Databricks App name (user-scoped, auto-derived from email short_name)"
    default: "myname-affinity-hub"

resources:
  apps:
    omnicom_affinity_app:
      name: "${var.app_name}"
      description: "Omnicom Affinity Hub — Supervisor Agent with identity passthrough and UC governance"
      source_code_path: .
      config:
        env:
          - name: SUPERVISOR_ENDPOINT
            value: "${var.supervisor_endpoint}"
          - name: TENANT_SPS_TABLE
            value: "${var.catalog}.${var.schema}.${var.tenant_sps_table}"
          - name: MLFLOW_EXPERIMENT_NAME
            value: "/Users/${workspace.current_user.userName}/${var.experiment_name}"

  jobs:
    workshop_pipeline:
      name: "${workspace.current_user.short_name}-adtech-ws"
      tasks:
        - task_key: "run_config"
          notebook_task:
            notebook_path: ./notebooks/00_config.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              volume: "${var.volume}"
              llm_endpoint: "${var.llm_endpoint}"
              ka_name: "${var.ka_name}"
              ka_endpoint: "${var.ka_endpoint}"
              genie_name: "${var.genie_name}"
              supervisor_endpoint: "${var.supervisor_endpoint}"
              experiment_name: "${var.experiment_name}"
              data_catalog: "${var.data_catalog}"
              data_schema: "${var.data_schema}"
              tenant_sps_table: "${var.tenant_sps_table}"

        - task_key: "setup_data"
          depends_on:
            - task_key: "run_config"
          notebook_task:
            notebook_path: ./notebooks/01_setup_data.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              volume: "${var.volume}"
              llm_endpoint: "${var.llm_endpoint}"
              ka_name: "${var.ka_name}"
              ka_endpoint: "${var.ka_endpoint}"
              genie_name: "${var.genie_name}"
              supervisor_endpoint: "${var.supervisor_endpoint}"
              experiment_name: "${var.experiment_name}"
              data_catalog: "${var.data_catalog}"
              data_schema: "${var.data_schema}"
              tenant_sps_table: "${var.tenant_sps_table}"

        - task_key: "setup_agents"
          depends_on:
            - task_key: "setup_data"
          notebook_task:
            notebook_path: ./notebooks/02a_setup_agents.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              volume: "${var.volume}"
              llm_endpoint: "${var.llm_endpoint}"
              ka_name: "${var.ka_name}"
              ka_endpoint: "${var.ka_endpoint}"
              genie_name: "${var.genie_name}"
              supervisor_endpoint: "${var.supervisor_endpoint}"
              experiment_name: "${var.experiment_name}"
              data_catalog: "${var.data_catalog}"
              data_schema: "${var.data_schema}"
              tenant_sps_table: "${var.tenant_sps_table}"

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
