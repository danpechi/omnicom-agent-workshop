# The main pipeline for mlflow_agent_workshop

resources:
  pipelines:
    mlflow_agent_workshop_etl:
      name: mlflow_agent_workshop_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/mlflow_agent_workshop_etl"

      libraries:
        - glob:
            include: ../src/mlflow_agent_workshop_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
