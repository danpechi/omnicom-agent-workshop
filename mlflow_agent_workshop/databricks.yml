# This is a Databricks asset bundle definition for mlflow_agent_workshop.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: mlflow_agent_workshop
  uuid: 59379f9b-6e3d-46c0-a20c-0bd74cc49ac2

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-9dcd6158-e299.cloud.databricks.com
    variables:
      catalog: ai_specialist
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-9dcd6158-e299.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/dan.pechi@databricks.com to make sure we only have a single copy.
      root_path: /Workspace/Users/dan.pechi@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ai_specialist
      schema: prod
    permissions:
      - user_name: dan.pechi@databricks.com
        level: CAN_MANAGE
